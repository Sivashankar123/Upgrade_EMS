<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Manage Events</title>
</head>

<body onload="checkAuth()">
    <div class="container mt-4">
        <div class="d-flex justify-content-between">
            <h2>Manage Events</h2>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
        <hr>

        <div class="card p-4 mb-6">
            <h5>Add New Event</h5>
            <form onsubmit="addEvent(event)" class="row g-3">
                <div class="col-md-2"><input type="text" id="evId" placeholder="ID" class="form-control" required></div>
                <div class="col-md-4"><input type="text" id="evName" placeholder="Event Name" class="form-control"
                        required></div>
                <div class="col-md-3">
                    <select id="evCat" class="form-select">
                        <option>Tech & Innovations</option>
                        <option>Industrial Events</option>
                    </select>
                </div>
                <div class="col-md-3"><input type="date" id="evDate" class="form-control" required></div>
                <div class="col-md-3"><input type="time" id="evTime" class="form-control" required></div>
                <div class="col-md-6"><input type="url" id="evUrl" placeholder="Event URL" class="form-control"
                        required></div>
                <div class="col-md-3"><button type="submit" class="btn btn-success w-100">Add Event</button></div>
            </form>
        </div>

        <div class="mb-3 mt-4">
            <input type="text" id="searchBox" onkeyup="searchEvents()" class="form-control"
                placeholder="Search by ID, Name or Category...">
        </div>

        <div id="adminList" class="row"></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        function renderAdminEvents(data) {
            const list = document.getElementById("adminList");
            list.innerHTML = "";
            data.forEach(ev => {
                list.innerHTML += `
                    <div class="col-md-4 mb-4">
                        <div class="card p-3 border-primary">
                            <h6>${ev.name}</h6>
                            <p> <strong>ID: </strong> ${ev.id}</p>
                            <p class="small text-muted mb-2"><strong>Category: </strong> ${ev.category}</p>
                             <p> <strong>Date: </strong> ${ev.date}</p>
                             <p> <strong>Time: </strong> ${ev.time}</p>
                            <button onclick="deleteEvent('${ev.id}')" class="btn btn-sm btn-outline-danger">Delete</button>
                        </div>
                    </div>`;
            });
        }
        renderAdminEvents(events);
    </script>
</body>

</html>
