<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Upgrad Events | Home</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark px-4">
        <a class="navbar-brand" href="#">Upgrad Events</a>
        <div class="ms-auto">
            <a class="nav-link d-inline text-white me-3" href="index.html">Home</a>
            <a class="nav-link d-inline text-white me-3" href="login.html">Login</a>
            <a class="nav-link d-inline text-white me-3" href="events.html">Events</a>
            <a class="nav-link d-inline text-white" href="contact.html">Contact Us</a>
        </div>
    </nav>

    <div class="hero-section text-center">
        <h1>Welcome to Upgrad Virtual Event Management</h1>
        <p class="text-muted container w-75">Upgrad hosts virtual events in categories like Tech & Innovations and Industrial Events. Join us to explore knowledge, connect with experts.</p>
    </div>

    <div class="container my-5">
        <h3 class="text-center mb-4">Upcoming Events</h3>
        <div id="displayArea" class="row"></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const area = document.getElementById("displayArea");
        events.forEach(ev => {
            area.innerHTML += `
                <div class="col-md-4 mb-4">
                    <div class="card p-3 event-card">
                        <h5>${ev.name}</h5>
                        <p class="mb-1 text-muted">Category: ${ev.category}</p>
                        <p class="mb-1">Date: ${ev.date}</p>
                        <p class="mb-3">Time: ${ev.time}</p>
                        <a href="register.html?id=${ev.id}" class="btn btn-primary w-100">Register</a>
                    </div>
                </div>`;
        });
    </script>
</body>
</html>
