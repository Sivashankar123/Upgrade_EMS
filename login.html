<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Admin Login</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark px-4">
        <a class="navbar-brand" href="#">Upgrad Events</a>
        <div class="ms-auto">
            <a class="nav-link d-inline text-white me-3" href="index.html">Home</a>
            <a class="nav-link d-inline text-white me-3" href="login.html">Login</a>
            <a class="nav-link d-inline text-white me-3" href="events.html">Events</a>
            <a class="nav-link d-inline text-white" href="contact.html">Contact Us</a>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4 shadow">
                <h2 class="text-center mb-4">Login</h2>
                <form onsubmit="login(event)">
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="email" class="form-control" required placeholder="admin@upgrad.com">
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
