<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration | Upgrad Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm px-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">Upgrad Events</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="fw-normal mb-4">Event Registration</h2>

        <div class="text-secondary border-top pb-2 mb-3 mt-4 fw-medium">
            Event Details
        </div>
        <div class="ps-2">
            <p class="mb-1"><strong>ID:</strong> <span id="displayId" class="text-muted"></span></p>
            <p class="mb-1"><strong>Name:</strong> <span id="displayName" class="text-muted"></span></p>
            <p class="mb-1"><strong>Category:</strong> <span id="displayCat" class="text-muted"></span></p>
            <p class="mb-1"><strong>Date:</strong> <span id="displayDate" class="text-muted"></span></p>
            <p class="mb-1"><strong>Time:</strong> <span id="displayTime" class="text-muted"></span></p>
        </div>

        <div class="text-secondary border-top pb-2 mb-3 mt-4 fw-medium">
            Participant Details
        </div>
        
        <form id="registrationForm" class="ps-2 col-md-5">
            <div class="mb-3">
                <input type="text" class="form-control" id="fname" placeholder="Shoaib" required>
            </div>
            <div class="mb-3">
                <input type="text" class="form-control" id="lname" placeholder="Ghachi" required>
            </div>
            <div class="mb-3">
                <input type="email" class="form-control" id="uEmail" placeholder="shoaib.ghachi@gmail.com" required>
            </div>
            
            <button type="submit" class="btn btn-success px-4">Register</button>
        </form>
    </div>

    <div class="fixed-bottom border-top border-4 border-success"></div>

    <script src="js/app.js"></script>
    <script>
        // 1. Get Event ID from URL
        const params = new URLSearchParams(window.location.search);
        const eventId = params.get('id');

        // 2. Find the event in our database (events array defined in app.js)
        const eventToRegister = events.find(e => e.id == eventId);

        if (eventToRegister) {
            document.getElementById('displayId').innerText = eventToRegister.id;
            document.getElementById('displayName').innerText = eventToRegister.name;
            document.getElementById('displayCat').innerText = eventToRegister.category;
            document.getElementById('displayDate').innerText = eventToRegister.date;
            document.getElementById('displayTime').innerText = eventToRegister.time;
        } else {
            alert("Please select a valid event.");
            window.location.href = "index.html";
        }

        // 3. Form Submit Logic
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("You are successfully registered to this event!");
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
